<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-2: #5f5e5a;
    --text-3: #9a9994;
    --surface-2: #f1efe8;
    --radius: 12px;
    --radius-sm: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.2);
      --text: #f0ede8;
      --text-2: #a09d98;
      --text-3: #6a6864;
      --surface-2: #2e2d2b;
    }
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  .dash { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .greeting { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
  .date-line { font-size: 24px; font-weight: 500; margin-bottom: 1.5rem; }
  .saved-badge { font-size: 11px; color: var(--text-3); margin-left: 10px; font-weight: 400; opacity: 0; transition: opacity 0.4s; }
  .saved-badge.show { opacity: 1; }

  /* cork board */
  .board {
    border-radius: var(--radius);
    border: 2px solid #8B6F4E;
    padding: 1rem 1.25rem;
    margin-bottom: 12px;
    min-height: 170px;
    background-color: #C4935A;
    background-image:
      radial-gradient(ellipse 2px 2px at 12px 18px, rgba(80,45,10,0.25) 100%, transparent 100%),
      radial-gradient(ellipse 1px 2px at 28px 6px,  rgba(80,45,10,0.18) 100%, transparent 100%),
      radial-gradient(ellipse 2px 1px at 5px 32px,  rgba(80,45,10,0.2)  100%, transparent 100%),
      radial-gradient(ellipse 1px 1px at 20px 40px, rgba(120,70,20,0.15)100%, transparent 100%),
      radial-gradient(ellipse 3px 2px at 38px 28px, rgba(80,45,10,0.12) 100%, transparent 100%),
      radial-gradient(ellipse 1px 3px at 44px 10px, rgba(80,45,10,0.2)  100%, transparent 100%);
    background-size: 48px 48px;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.18), inset 0 -1px 2px rgba(255,255,255,0.08);
  }
  .board-inner { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; }
  .polaroid-wrap { position: relative; display: inline-block; }
  .polaroid { background: #fff; border: 0.5px solid #d3d1c7; padding: 7px 7px 24px 7px; width: 110px; transition: transform 0.15s; }
  .polaroid:hover { transform: scale(1.04); }
  .polaroid img { width: 96px; height: 80px; object-fit: cover; display: block; }
  .caption-edit { font-size: 11px; color: #5f5e5a; text-align: center; margin-top: 6px; border: none; outline: none; background: transparent; width: 96px; font-family: var(--font); }
  .caption-edit::placeholder { color: #b4b2a9; }
  .pin { width: 11px; height: 11px; border-radius: 50%; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); border: 1.5px solid rgba(0,0,0,0.2); }
  .remove-photo { position: absolute; top: -7px; right: -7px; width: 17px; height: 17px; border-radius: 50%; background: #e24b4a; border: none; color: #fff; font-size: 11px; cursor: pointer; display: none; align-items: center; justify-content: center; padding: 0; }
  .polaroid-wrap:hover .remove-photo { display: flex; }
  .add-polaroid { width: 110px; height: 130px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border: 1.5px dashed rgba(255,255,255,0.5); border-radius: 2px; cursor: pointer; color: rgba(255,255,255,0.75); font-size: 12px; background: rgba(255,255,255,0.08); transition: background 0.15s; }
  .add-polaroid:hover { background: rgba(255,255,255,0.18); }
  .add-polaroid-icon { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 18px; color: rgba(255,255,255,0.8); }
  #file-input { display: none; }

  /* grid */
  .grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 520px) {
    .grid, .grid-3 { grid-template-columns: 1fr; }
    .grid .card[style*="grid-column"] { grid-column: 1 !important; }
  }

  /* card */
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .card-label { font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .stat-num { font-size: 26px; font-weight: 500; }
  .stat-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  /* tasks */
  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text-3); }
  .checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border-mid); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; }
  .checkbox.checked { background: #9fe1cb; border-color: #1d9e75; }
  .checkmark { display: none; width: 8px; height: 5px; border-left: 1.5px solid #0f6e56; border-bottom: 1.5px solid #0f6e56; transform: rotate(-45deg) translateY(-1px); }
  .checkbox.checked .checkmark { display: block; }
  .task-text { flex: 1; outline: none; border: none; background: transparent; font-size: 13px; font-family: var(--font); color: var(--text); cursor: text; padding: 2px 4px; border-radius: 4px; }
  .task-text:focus { background: var(--surface-2); }
  .task-delete { opacity: 0; width: 16px; height: 16px; background: none; border: none; color: var(--text-3); font-size: 14px; cursor: pointer; padding: 0; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .task-item:hover .task-delete { opacity: 1; }
  .add-task { display: flex; align-items: center; gap: 8px; margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 10px; }
  .add-task input { flex: 1; font-size: 13px; border: none; outline: none; background: transparent; color: var(--text); font-family: var(--font); }
  .add-task input::placeholder { color: var(--text-3); }
  .add-btn { font-size: 20px; color: var(--text-3); cursor: pointer; background: none; border: none; padding: 0; line-height: 1; }

  /* budget */
  .budget-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .budget-total-label { font-size: 13px; color: var(--text-2); }
  .budget-total-num { font-size: 22px; font-weight: 500; }
  .budget-total-of { font-size: 13px; color: var(--text-3); }
  .budget-row { margin-bottom: 12px; }
  .budget-row:last-child { margin-bottom: 0; }
  .budget-row-top { display: flex; justify-content: space-between; align-items: center; font-size: 12px; gap: 6px; }
  .bcat { color: var(--text-2); flex: 1; outline: none; border: none; background: transparent; font-size: 12px; font-family: var(--font); color: var(--text-2); cursor: text; padding: 1px 3px; border-radius: 3px; min-width: 0; }
  .bcat:focus { background: var(--surface-2); color: var(--text); }
  .bvals { display: flex; align-items: center; gap: 3px; font-weight: 500; white-space: nowrap; }
  .bnum { width: 38px; border: none; outline: none; background: transparent; font-size: 12px; font-weight: 500; font-family: var(--font); color: var(--text); text-align: right; padding: 1px 3px; border-radius: 3px; cursor: text; }
  .bnum:focus { background: var(--surface-2); }
  .bsep { color: var(--text-3); font-weight: 400; }
  .budget-bar-bg { background: var(--surface-2); border-radius: 4px; height: 7px; margin: 6px 0; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
  .budget-row-delete { opacity: 0; background: none; border: none; color: var(--text-3); font-size: 14px; cursor: pointer; padding: 0; flex-shrink: 0; line-height: 1; }
  .budget-row:hover .budget-row-delete { opacity: 1; }
  .budget-add { font-size: 12px; color: var(--text-3); cursor: pointer; background: none; border: none; padding: 6px 0 0; font-family: var(--font); display: block; }
  .budget-add:hover { color: var(--text-2); }

  /* habits */
  .habit-section { margin-bottom: 14px; }
  .habit-section:last-child { margin-bottom: 0; }
  .habit-name { font-size: 12px; color: var(--text-2); margin-bottom: 5px; display: flex; justify-content: space-between; }
  .habit-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .habit-dot { width: 100%; aspect-ratio: 1; border-radius: 3px; background: var(--surface-2); cursor: pointer; }
  .habit-dot.done-teal   { background: #5dcaa5; }
  .habit-dot.done-pink   { background: #ed93b1; }
  .habit-dot.done-purple { background: #afa9ec; }
  .day-labels { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-top: 3px; }
  .day-label { font-size: 10px; color: var(--text-3); text-align: center; }
</style>
</head>
<body>
<div class="dash">
  <p class="greeting">Good day, baddie!</p>
  <p class="date-line" id="date-line"> <span class="saved-badge" id="saved-badge">saved</span></p>

  <!-- cork board -->
  <div class="board">
    <div class="board-inner" id="board-inner">
      <div class="add-polaroid" onclick="document.getElementById('file-input').click()">
        <div class="add-polaroid-icon">+</div>
        <span>add photo</span>
      </div>
    </div>
  </div>
  <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(event)" />

  <!-- tasks -->
  <div class="grid" style="margin-bottom:12px;">
    <div class="card" style="grid-column:1/-1;">
      <div class="card-label">Today's tasks</div>
      <div class="task-list" id="task-list"></div>
      <div class="add-task">
        <input type="text" id="new-task" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTaskBtn()" />
        <button class="add-btn" onclick="addTaskBtn()">+</button>
      </div>
    </div>
  </div>

  <!-- budget + habits -->
  <div class="grid">
    <div class="card">
      <div class="card-label">Budget — <span id="budget-month"></span></div>
      <div class="budget-total-row">
        <span class="budget-total-label">spent</span>
        <span><span class="budget-total-num" id="b-spent"></span> <span class="budget-total-of">/ <span id="b-total"></span></span></span>
      </div>
      <div id="budget-rows"></div>
      <button class="budget-add" onclick="addBudgetRow()">+ add category</button>
    </div>

    <div class="card">
      <div class="card-label">Habits — this week</div>
      <div id="habits-container"></div>
    </div>
  </div>

  <!-- stats -->
  <div class="grid-3">
    <div class="card" style="text-align:center;padding:0.85rem 1rem;">
      <div class="stat-num" id="tasks-done">0</div>
      <div class="stat-sub">tasks done today</div>
    </div>
    <div class="card" style="text-align:center;padding:0.85rem 1rem;">
      <div class="stat-num" id="stat-left" style="color:#1d9e75;">—</div>
      <div class="stat-sub">left this month</div>
    </div>
    <div class="card" style="text-align:center;padding:0.85rem 1rem;">
      <div class="stat-num" id="habits-done">0</div>
      <div class="stat-sub">habit check-ins</div>
    </div>
  </div>
</div>

<script>
// ── date ──────────────────────────────────────────────
const NOW = new Date();
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('date-line').childNodes[0].textContent =
  DAYS[NOW.getDay()] + ', ' + MONTHS[NOW.getMonth()] + ' ' + NOW.getDate() + ' ';
document.getElementById('budget-month').textContent = MONTHS[NOW.getMonth()];

// ── IndexedDB ─────────────────────────────────────────
let db;
const DB_NAME = 'dashboard', DB_VER = 1, STORE = 'data';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror   = e => rej(e);
  });
}
function dbGet(key) {
  return new Promise(res => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => res(null);
  });
}
function dbSet(key, val) {
  return new Promise(res => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = () => res();
  });
}

// ── save indicator ────────────────────────────────────
let saveTimer;
function flashSaved() {
  const b = document.getElementById('saved-badge');
  b.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => b.classList.remove('show'), 1800);
}

// ── photos ────────────────────────────────────────────
const PIN_COLORS = ['#ED93B1','#9FE1CB','#AFA9EC','#FAC775','#F0997B','#85B7EB'];
const ROTATIONS  = [-3,2,-1.5,3,-2.5,1,-4,2.5,-1,3.5];
let pinIdx = 0, rotIdx = 0;
let photos = []; // [{id, src, caption}]

async function savePhotos() {
  // store only caption + rotation; src stored separately to avoid quota issues
  const meta = photos.map(p => ({ id: p.id, caption: p.caption, rot: p.rot, pinColor: p.pinColor }));
  await dbSet('photos_meta', meta);
  for (const p of photos) await dbSet('photo_src_' + p.id, p.src);
  flashSaved();
}

async function loadPhotos() {
  const meta = await dbGet('photos_meta');
  if (!meta) return;
  for (const m of meta) {
    const src = await dbGet('photo_src_' + m.id);
    if (src) renderPolaroid(src, m.caption, m.rot, m.pinColor, m.id);
  }
}

function handleFiles(e) {
  Array.from(e.target.files).forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      const id = Date.now() + Math.random();
      const rot = ROTATIONS[rotIdx++ % ROTATIONS.length];
      const pinColor = PIN_COLORS[pinIdx++ % PIN_COLORS.length];
      const caption = f.name.replace(/\.[^.]+$/, '').slice(0, 16);
      photos.push({ id, src: ev.target.result, caption, rot, pinColor });
      renderPolaroid(ev.target.result, caption, rot, pinColor, id);
      savePhotos();
    };
    reader.readAsDataURL(f);
  });
  e.target.value = '';
}

function renderPolaroid(src, caption, rot, pinColor, id) {
  const board = document.getElementById('board-inner');
  const addBtn = board.querySelector('.add-polaroid');

  const wrap = document.createElement('div');
  wrap.className = 'polaroid-wrap';
  wrap.style.transform = `rotate(${rot}deg)`;
  wrap.dataset.id = id;

  const pin = document.createElement('div');
  pin.className = 'pin';
  pin.style.background = pinColor;

  const pol = document.createElement('div');
  pol.className = 'polaroid';

  const img = document.createElement('img');
  img.src = src;

  const cap = document.createElement('input');
  cap.className = 'caption-edit';
  cap.placeholder = 'caption...';
  cap.value = caption;
  cap.onclick = ev => ev.stopPropagation();
  cap.oninput = () => {
    const p = photos.find(p => p.id == id);
    if (p) { p.caption = cap.value; savePhotos(); }
  };

  const rm = document.createElement('button');
  rm.className = 'remove-photo';
  rm.textContent = '×';
  rm.onclick = ev => {
    ev.stopPropagation();
    wrap.remove();
    photos = photos.filter(p => p.id != id);
    dbSet('photo_src_' + id, null);
    savePhotos();
  };

  pol.appendChild(img);
  pol.appendChild(cap);
  wrap.appendChild(pin);
  wrap.appendChild(pol);
  wrap.appendChild(rm);
  board.insertBefore(wrap, addBtn);
}

// ── tasks ─────────────────────────────────────────────
let tasks = [];

async function saveTasks() {
  await dbSet('tasks', tasks);
  flashSaved();
}

async function loadTasks() {
  const saved = await dbGet('tasks');
  if (saved && saved.length) {
    tasks = saved;
    tasks.forEach(t => renderTask(t));
  } else {
    [
      { id: 1, text: 'Morning journaling', done: true },
      { id: 2, text: 'Review weekly budget', done: false },
      { id: 3, text: '30 min walk', done: false },
      { id: 4, text: 'Reply to emails', done: false },
    ].forEach(t => { tasks.push(t); renderTask(t); });
  }
  updateTaskCount();
}

function renderTask(t) {
  const list = document.getElementById('task-list');
  const item = document.createElement('div');
  item.className = 'task-item' + (t.done ? ' done' : '');
  item.dataset.id = t.id;

  const cb = document.createElement('div');
  cb.className = 'checkbox' + (t.done ? ' checked' : '');
  cb.innerHTML = '<div class="checkmark"></div>';
  cb.onclick = () => {
    t.done = !t.done;
    item.classList.toggle('done', t.done);
    cb.classList.toggle('checked', t.done);
    updateTaskCount();
    saveTasks();
  };

  const txt = document.createElement('span');
  txt.className = 'task-text';
  txt.contentEditable = 'true';
  txt.textContent = t.text;
  txt.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); txt.blur(); } };
  txt.oninput = () => { t.text = txt.textContent; saveTasks(); };

  const del = document.createElement('button');
  del.className = 'task-delete';
  del.textContent = '×';
  del.onclick = () => {
    item.remove();
    tasks = tasks.filter(x => x.id !== t.id);
    updateTaskCount();
    saveTasks();
  };

  item.appendChild(cb);
  item.appendChild(txt);
  item.appendChild(del);
  list.appendChild(item);
}

function addTaskBtn() {
  const inp = document.getElementById('new-task');
  const val = inp.value.trim();
  if (!val) return;
  const t = { id: Date.now(), text: val, done: false };
  tasks.push(t);
  renderTask(t);
  updateTaskCount();
  saveTasks();
  inp.value = '';
}

function updateTaskCount() {
  document.getElementById('tasks-done').textContent = tasks.filter(t => t.done).length;
}

// ── budget ────────────────────────────────────────────
const BAR_COLORS = ['#5DCAA5','#ED93B1','#AFA9EC','#FAC775','#85B7EB','#F0997B'];
let budgetRows = [];

async function saveBudget() {
  await dbSet('budget', budgetRows);
  flashSaved();
}

async function loadBudget() {
  const saved = await dbGet('budget');
  budgetRows = saved || [
    { cat: 'Groceries', spent: 310, limit: 400 },
    { cat: 'Dining out', spent: 195, limit: 200 },
    { cat: 'Transport',  spent: 80,  limit: 150 },
    { cat: 'Other',      spent: 655, limit: 1250 },
  ];
  renderBudget();
}

function renderBudget() {
  const container = document.getElementById('budget-rows');
  container.innerHTML = '';
  let totalSpent = 0, totalLimit = 0;

  budgetRows.forEach((row, i) => {
    totalSpent += row.spent;
    totalLimit += row.limit;
    const pct   = Math.min(100, Math.round(row.limit > 0 ? (row.spent / row.limit) * 100 : 0));
    const color = BAR_COLORS[i % BAR_COLORS.length];
    const div   = document.createElement('div');
    div.className = 'budget-row';
    div.innerHTML = `
      <div class="budget-row-top">
        <input class="bcat" value="${row.cat}" data-i="${i}" />
        <div class="bvals">
          $<input class="bnum" value="${row.spent}" data-i="${i}" data-f="spent" style="${pct>=95?'color:#a32d2d;':''}" />
          <span class="bsep">/</span>
          $<input class="bnum" value="${row.limit}" data-i="${i}" data-f="limit" />
        </div>
        <button class="budget-row-delete" data-i="${i}">×</button>
      </div>
      <div class="budget-bar-bg"><div class="budget-bar-fill" style="width:${pct}%;background:${color};"></div></div>`;
    container.appendChild(div);
  });

  document.getElementById('b-spent').textContent = '$' + totalSpent.toLocaleString();
  document.getElementById('b-total').textContent  = '$' + totalLimit.toLocaleString();
  const left = totalLimit - totalSpent;
  const el   = document.getElementById('stat-left');
  el.textContent  = '$' + Math.abs(left).toLocaleString() + (left < 0 ? ' over' : '');
  el.style.color  = left < 0 ? '#a32d2d' : '#1d9e75';

  container.querySelectorAll('.bcat').forEach(inp => {
    inp.oninput = () => { budgetRows[+inp.dataset.i].cat = inp.value; saveBudget(); };
  });
  container.querySelectorAll('.bnum').forEach(inp => {
    inp.oninput = () => {
      budgetRows[+inp.dataset.i][inp.dataset.f] = parseFloat(inp.value) || 0;
      renderBudget(); saveBudget();
    };
    inp.onkeydown = e => { if (e.key === 'Enter') inp.blur(); };
  });
  container.querySelectorAll('.budget-row-delete').forEach(btn => {
    btn.onclick = () => { budgetRows.splice(+btn.dataset.i, 1); renderBudget(); saveBudget(); };
  });
}

function addBudgetRow() {
  budgetRows.push({ cat: 'New category', spent: 0, limit: 100 });
  renderBudget(); saveBudget();
  const inputs = document.querySelectorAll('.bcat');
  const last   = inputs[inputs.length - 1];
  if (last) { last.focus(); last.select(); }
}

// ── habits ────────────────────────────────────────────
const DEFAULT_HABITS = [
  { name: 'Ate Breakfast', color: 'teal',   streak: 5, days: [1,1,1,1,1,0,0] },
  { name: 'Read a Book',      color: 'pink',   streak: 3, days: [1,0,1,1,1,0,0] },
  { name: 'No Spend',      color: 'purple', streak: 2, days: [0,0,0,1,1,0,0] },
];
let habitData = [];

async function saveHabits() {
  await dbSet('habits', habitData);
  flashSaved();
}

async function loadHabits() {
  const saved = await dbGet('habits');
  habitData = saved || JSON.parse(JSON.stringify(DEFAULT_HABITS));
  renderHabits();
}

function renderHabits() {
  const c = document.getElementById('habits-container');
  c.innerHTML = '';
  const DAY_LABELS = ['M','T','W','T','F','S','S'];

  habitData.forEach((h, hi) => {
    const streak = h.days.reduce((acc, v, i, arr) => {
      let s = 0, j = i;
      while (j >= 0 && arr[j]) { s++; j--; }
      return Math.max(acc, s);
    }, 0);

    const sec = document.createElement('div');
    sec.className = 'habit-section';
    sec.innerHTML = `<div class="habit-name"><span>${h.name}</span><span>${streak} day streak</span></div>`;

    const grid = document.createElement('div');
    grid.className = 'habit-grid';
    h.days.forEach((on, di) => {
      const dot = document.createElement('div');
      dot.className = 'habit-dot' + (on ? ' done-' + h.color : '');
      dot.onclick = () => {
        h.days[di] = h.days[di] ? 0 : 1;
        renderHabits(); saveHabits(); updateHabitCount();
      };
      grid.appendChild(dot);
    });

    const labels = document.createElement('div');
    labels.className = 'day-labels';
    DAY_LABELS.forEach(l => {
      const d = document.createElement('div');
      d.className = 'day-label';
      d.textContent = l;
      labels.appendChild(d);
    });

    sec.appendChild(grid);
    sec.appendChild(labels);
    c.appendChild(sec);
  });
  updateHabitCount();
}

function updateHabitCount() {
  const total = habitData.reduce((s, h) => s + h.days.filter(Boolean).length, 0);
  document.getElementById('habits-done').textContent = total;
}

// ── boot ──────────────────────────────────────────────
openDB().then(() => {
  loadPhotos();
  loadTasks();
  loadBudget();
  loadHabits();
});
